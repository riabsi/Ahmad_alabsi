<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صدقة جارية عن روح أحمد العبسي</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .dua { font-size: 20px; color: #555; margin-top: 20px; font-style: italic; }
        .quran { font-size: 24px; color: #000; margin: 30px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>صدقة جارية عن روح والدي</h1>
    <h2>أحمد العبسي</h2>
    
    <div class="quran" id="quran">
        "بسم الله الرحمن الرحيم"
    </div>
    
    <div class="dua" id="dua">
        اللهم اغفر لأحمد العبسي وارحمه، وأسكنه فسيح جناتك.
    </div>

    <button onclick="changeDua()" style="margin-top: 20px; padding: 10px 20px; cursor: pointer;">دعاء آخر</button>
</div>

<script>
    function changeDua() {
        const prayers = [
            "اللهم اجعل القرآن الكريم نوراً في قبر أحمد العبسي.",
            "اللهم ارحم أحمد العبسي واغفر له، وارفع درجته في المهديين.",
            "اللهم طيب ثرى أحمد العبسي، وأكرم مثواه."
        ];
        document.getElementById('dua').innerText = prayers[Math.floor(Math.random() * prayers.length)];
    }
</script>

</body>
</html>
