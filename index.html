<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    
    <meta property="og:title" content="صدقة جارية عن روح المرحوم أحمد محمد أحمد العبسي">
    <meta property="og:description" content="صدقة جارية، القرآن الكريم وقصص الأنبياء. رحم الله والدي وأسكنه فسيح جناته.">
    <meta property="og:image" content="https://i.ibb.co/ZRK2DWbj/AHMAD.jpg">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <title>صدقة جارية عن روح أحمد العبسي</title>
    <style>
        /* التصميم الأسود والذهبي */
        body { background-color: #000000; color: #ffffff; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        .header-box { position: relative; border: 2px solid #d4af37; padding: 15px; box-shadow: 0 0 15px rgba(212,175,55,0.3); margin-bottom: 20px; border-radius: 10px; background: #111; overflow: hidden; }
        
        /* الشريط السكني المائل */
        .ribbon { position: absolute; top: 10px; right: -25px; width: 100px; background: #808080; color: #fff; transform: rotate(45deg); font-size: 12px; padding: 3px 0; text-align: center; z-index: 10; }
        
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #d4af37; object-fit: cover; margin-bottom: 10px; }
        .name-lg { font-size: 22px; color: #d4af37; margin: 5px 0; font-weight: bold; }
        .ayah { font-size: 14px; color: #ccc; margin-top: 5px; font-style: italic; }
        
        /* الأزرار ذهبية */
        .btn-container { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); margin-top: 20px; }
        .btn { background: #1a1a1a; border: 1px solid #d4af37; color: #d4af37; padding: 12px; cursor: pointer; border-radius: 5px; font-size: 14px; transition: 0.3s; }
        .btn:hover { background: #d4af37; color: #000; font-weight: bold; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; }
        .modal-content { position: relative; margin: 5% auto; width: 90%; max-width: 600px; background: #111; padding: 20px; border: 2px solid #d4af37; border-radius: 10px; }
        .close { position: absolute; top: 5px; right: 15px; cursor: pointer; font-size: 40px; color: #d4af37; }
        
        .surah-grid, .tasbih-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 15px; }
        .surah-btn { background: #1a1a1a; border: 1px solid #d4af37; color: #d4af37; padding: 10px; cursor: pointer; border-radius: 5px; font-size: 14px; }
        .surah-btn:hover { background: #d4af37; color: #000; }
        
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin-top: 30px; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

<audio id="audioPlayer" src=""></audio>

<div class="header-box">
    <div class="ribbon">متوفى</div>
    <img src="AHMAD.jpg" alt="أحمد محمد أحمد العبسي" class="profile-img">
    <h3 style="font-size: 16px; margin: 5px 0; color: #fff;">صدقة جارية عن روح المرحوم</h3>
    <h2 class="name-lg">أحمد محمد أحمد العبسي</h2>
    <p class="ayah">"كُلُّ نَفْسٍ ذَائِقَةُ الْمَوْتِ"</p>
</div>

<div class="btn-container">
    <button class="btn" onclick="openVideo('https://www.youtube.com/embed/V2Brp_esIVI')">أذكار الصباح</button>
    <button class="btn" onclick="openVideo('https://www.youtube.com/embed/Iu_LnPAcHM8')">أذكار المساء</button>
    <button class="btn" onclick="openVideo('https://www.youtube.com/embed/UEvDeOZ-twY')">الرقية الشرعية</button>
    <button class="btn" onclick="openVideo('https://www.youtube.com/embed/ERAi06ADAkA')">أدعية للميت</button>
    <button class="btn" onclick="openVideo('https://www.youtube.com/embed/f6OYaM4xekg')">أدعية للرزق</button>
    <button class="btn" onclick="showStories()">قصص الأنبياء</button>
    <button class="btn" onclick="showSurahs()">القرآن الكريم</button>
    <button class="btn" onclick="showTasbih()">أذكار وتسبيح</button>
</div>

<div id="videoModal" class="modal"><div class="modal-content"><span class="close" onclick="closeModal('videoModal')">&times;</span><div class="video-wrapper"><iframe id="videoFrame" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe></div></div></div>

<div id="storiesModal" class="modal"><div class="modal-content"><span class="close" onclick="closeModal('storiesModal')">&times;</span><h3 style="color:#d4af37">قصص الأنبياء</h3><div class="btn-container" style="grid-template-columns: 1fr;"><button class="btn" onclick="openVideo('https://www.youtube.com/embed/hC-hfDGgMVg')">سيدنا آدم</button></div></div></div>

<div id="surahModal" class="modal"><div class="modal-content"><span class="close" onclick="closeModal('surahModal')">&times;</span><h3 style="color:#d4af37">القرآن الكريم</h3><div id="surahList" class="surah-grid"></div></div></div>

<div id="tasbihModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('tasbihModal')">&times;</span>
        <h3 style="color:#d4af37">أذكار وتسبيح</h3>
        <div class="tasbih-grid">
            <button class="surah-btn" onclick="playAudio('URL_MP3_HERE_1')">سبحان الله وبحمده</button>
            <button class="surah-btn" onclick="playAudio('URL_MP3_HERE_2')">أستغفر الله العظيم</button>
            <button class="surah-btn" onclick="playAudio('URL_MP3_HERE_3')">لا إله إلا الله</button>
        </div>
    </div>
</div>

<script>
    function playAudio(url) { 
        const audio = document.getElementById('audioPlayer'); 
        audio.src = url; 
        audio.play(); 
        alert("جاري التشغيل...");
    }
    function openVideo(url) { document.getElementById('videoFrame').src = url + "?autoplay=1"; document.getElementById('videoModal').style.display = "block"; }
    function showSurahs() { document.getElementById('surahModal').style.display = "block"; }
    function showStories() { document.getElementById('storiesModal').style.display = "block"; }
    function showTasbih() { document.getElementById('tasbihModal').style.display = "block"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; document.getElementById('videoFrame').src = ""; }
    
    // إكمال كود السور كما كان سابقاً
    const container = document.getElementById('surahList');
    const surahNames = ["الفاتحة", "البقرة"]; // يمكنك إضافة الباقي
    surahNames.forEach((name, index) => { const btn = document.createElement('button'); btn.className = 'surah-btn'; btn.innerText = name; btn.onclick = () => window.open(`https://server8.mp3quran.net/afs/${(index+1).toString().padStart(3,'0')}.mp3`, '_blank'); container.appendChild(btn); });
</script>
</body>
</html>
